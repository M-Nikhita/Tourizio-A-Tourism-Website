<div class="auth-container">
  <div class="container-fluid">
    <div class="row vh-100">
      
      <!-- Left side with the background image -->
      <div class="col-lg-7 d-none d-lg-block p-0">
        <div class="image-container"></div>
      </div>
      
      <!-- Right side with the sign-up form -->
      <div class="col-lg-5 d-flex align-items-center justify-content-center p-4">
        <div class="form-container">
          <div class="text-center mb-4">
            <h1 class="fw-bold">Join the Adventure</h1>
            <p class="text-muted">Create your account to start booking amazing tours around the world.</p>
          </div>

          <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" id="name" class="form-control form-control-lg" formControlName="name"
                     [class.is-invalid]="signupForm.get('name')?.invalid && signupForm.get('name')?.touched"
                     placeholder="John Doe">
              <div *ngIf="signupForm.get('name')?.invalid && signupForm.get('name')?.touched" class="invalid-feedback">
                Name is required.
              </div>
            </div>
            
            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" id="email" class="form-control form-control-lg" formControlName="email"
                     [class.is-invalid]="signupForm.get('email')?.invalid && signupForm.get('email')?.touched"
                     placeholder="you@example.com">
              <div *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched" class="invalid-feedback">
                Please enter a valid email.
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" id="password" class="form-control form-control-lg" formControlName="password"
                     [class.is-invalid]="signupForm.get('password')?.invalid && signupForm.get('password')?.touched"
                     placeholder="Minimum 6 characters">
              <div *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched" class="invalid-feedback">
                <div *ngIf="signupForm.get('password')?.errors?.['required']">Password is required.</div>
                <div *ngIf="signupForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</div>
              </div>
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-success btn-lg">Create Account</button>
            </div>
          </form>

          <div class="text-center mt-4">
            <small class="text-muted">
              Already have an account? <a routerLink="/login" class="fw-bold">Login</a>
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
