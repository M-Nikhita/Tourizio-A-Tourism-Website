<div class="hero-section">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>Your Journey Starts Here</h1>
    <p>Explore breathtaking destinations and book your dream tour today.</p>
    <a routerLink="/destinations" class="btn btn-primary btn-lg">Explore Destinations</a>
  </div>
</div>

<div class="container my-5">
  <h2 class="text-center mb-4">Featured Countries</h2>
  <div class="row">
    <div *ngFor="let country of featuredCountries" class="col-md-4 mb-4">
      <div class="card shadow-sm">
        <a [routerLink]="['/destinations', country.name]">
          <img [src]="country.image" class="card-img-top" [alt]="country.name">
        </a>
        <div class="card-body">
          <h5 class="card-title">{{ country.name }}</h5>
          <p class="card-text">{{ country.description }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
