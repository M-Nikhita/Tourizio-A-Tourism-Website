<div class="auth-container d-flex align-items-center justify-content-center">
  <div class="container-fluid">
    <div class="row vh-100">
      <div class="col-lg-7 d-none d-lg-block p-0">
        <div class="image-container">
          <div class="explore-text">Explore!</div>
        </div>
      </div>
      
      <div class="col-lg-5 d-flex align-items-center justify-content-center p-4">
        <div class="form-container">
          <div class="text-center mb-4">
            <h1 class="fw-bold">Welcome Back!</h1>
            <p class="text-muted">Log in to continue your journey with Tourizio.</p>
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" id="email" class="form-control form-control-lg" formControlName="email"
                     [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                     placeholder="you@example.com">
              <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="invalid-feedback">
                Please enter a valid email.
              </div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" id="password" class="form-control form-control-lg" formControlName="password"
                     [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                     placeholder="••••••••">
              <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="invalid-feedback">
                Password is required.
              </div>
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg">Login</button>
            </div>
          </form>

          <div class="text-center mt-4">
            <small class="text-muted">
              Don't have an account? <a routerLink="/signup" class="fw-bold">Sign Up</a>
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="popup-overlay" *ngIf="showWelcomePopup">
  <div class="popup-card">
    <h2 class="text-success">Login Successful!</h2>
    <p>Welcome back! We're glad to see you again.</p>
    <button class="btn btn-success mt-3" (click)="closePopup()">Continue Your Journey</button>
  </div>
</div>
