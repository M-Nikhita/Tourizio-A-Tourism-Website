<div class="container my-5">
  <h2 class="text-center mb-4">All Countries</h2>
  <div class="d-flex justify-content-between align-items-center mb-4">
  <div class="d-flex">
    <div class="dropdown me-2">
      <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
        Sort By
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" (click)="sortByNameAsc()">Name (A-Z)</a></li>
        <li><a class="dropdown-item" (click)="sortByNameDesc()">Name (Z-A)</a></li>
      </ul>
    </div>
  </div>
  <div class="input-group" style="max-width: 300px;">
    <input type="text" class="form-control" placeholder="Search for a country..." [(ngModel)]="searchQuery" (ngModelChange)="onSearch()">
  </div>
</div>
  <div class="row">
    <div *ngFor="let country of filteredCountries" class="col-md-4 mb-4">
      <div class="card shadow-sm h-100 d-flex flex-column">
        <a [routerLink]="['/destinations', country.name]">
          <img [src]="country.image" class="card-img-top" [alt]="country.name">
        </a>
        <div class="card-body text-center flex-grow-1 d-flex flex-column justify-content-between">
          <h5 class="card-title">{{ country.name }}</h5>
          <p class="card-text">{{ country.description }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
